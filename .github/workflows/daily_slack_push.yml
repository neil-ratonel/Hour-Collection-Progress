name: Daily Holiday Compliance Slack Push

on:
  schedule:
    - cron: "0 16 * * *"  # 9AM PDT (UTC-7) daily
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  push-to-slack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas python-dotenv slack-sdk requests

      - name: Run Slack push
        env:
          MODE_API_TOKEN:      ${{ secrets.MODE_API_TOKEN }}
          MODE_API_SECRET:     ${{ secrets.MODE_API_SECRET }}
          SLACK_WEBHOOK_URL:   ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL_2: ${{ secrets.SLACK_WEBHOOK_URL_2 }}
        run: python push_to_slack.py
